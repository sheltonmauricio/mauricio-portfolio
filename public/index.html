<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Mauricio's Portfolio</title>
    <script>
      var userLang = navigator.language || navigator.userLanguage;

      var repo = '/mauricio-portfolio'; 
      
      if (userLang.startsWith('en')) {
        window.location.href = repo + '/en/';
      } else {
        window.location.href = repo + '/pt/';
      }
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
